<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
</head>
<body>
    <div id="load-save-buttons">
        <button id="load-data">Load Data</button>
    </div>
    <nav id="projects">
    
    </nav>
    <div id="container">

    </div>
    <dialog id="form-modal">
        <h2 id="form-title">New Item</h2>
        <form method="dialog" id="new-item-form">
            <input type="hidden" name="id" id="new-item-id">
            <input type="hidden" name="type" id="new-item-type">
            <input type="hidden" name="subtype" id="new-item-subtype">
            <label for="title" id="title-input-label">Item Name:</label>
            <input type="text" id="title" name="title">
            
            <fieldset class="list-fields item-fields subitem-fields">
                <input type="hidden" name="parentId" id="new-item-parent-id">
                <fieldset class="list-fields item-fields subitem-fields radio">
                    <legend>
                        Priority Level:
                    </legend>
                    <div class="radio-item">
                        <input type="radio" id="low" name="priority" value="Low" checked>
                        <label for="low">Low</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="medium" name="priority" value="Medium">
                        <label for="medium">Medium</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="high" name="priority" value="High">
                        <label for="high">High</label>
                    </div>
                </fieldset>
                <label for="due">Due Date (optional):</label>
                <input type="datetime-local" id="due" name="due">
            </fieldset>
            <fieldset class="item-fields subitem-fields">
                <label for="desc">Description (optional):</label>
                <textarea rows="3" id="desc" name="desc"></textarea>
                <label for="notes">Additional Notes (optional):</label>
                <textarea rows="3" id="notes" name="notes"></textarea>
            </fieldset>
            <button type="submit" id="new-item-submit">Submit</button>
        </form>
        <button id="form-modal-close">X</button>
    </dialog>
</body>
</html>
